name: Generate Snake

on:
  schedule:
    # Run once a day
    - cron: "0 0 * * *"
  # Allow manual trigger
  workflow_dispatch:
  # Run on every push to main/master branch
  push:
    branches:
    - main
    - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Generates the snake game from a github user's contributions graph
      - uses: Platane/snk@v3
        with:
          github_user_name: Aryan4132
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Push the changes to the output branch
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
